<article class="category-card">
  <div class="category-card__icon" aria-hidden="true">
    <svg
      [lucideIcon]="icon()"
      [size]="26"
      [strokeWidth]="2"
    ></svg>
  </div>

  <div class="category-card__content">
    <h3>{{ title() }}</h3>

    <p>{{ professionals() }} profissionais</p>
  </div>

  <span class="category-card__arrow" aria-hidden="true">
    →
  </span>
</article>
