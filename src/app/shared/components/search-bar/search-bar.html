<form class="search-bar">
  <div class="search-bar__field">
    <label for="service">O que você procura?</label>

    <input
      id="service"
      name="service"
      type="text"
      placeholder="Ex.: DJ, fotógrafo, decoração"
    />
  </div>

  <div class="search-bar__divider"></div>

  <div class="search-bar__field">
    <label for="location">Onde será o evento?</label>

    <input
      id="location"
      name="location"
      type="text"
      placeholder="Cidade ou região"
    />
  </div>

  <button class="search-bar__button" type="submit">
    Buscar
  </button>
</form>
